---
- name: Fail on unsupported OS family
  ansible.builtin.fail:
    msg: >-
      hyprland role does not support OS family '{{ ansible_facts.get('os_family', 'unknown') }}'.
      Supported families: Debian, Archlinux.
  when: ansible_facts.get('os_family', 'unknown') not in ['Debian', 'Archlinux']

- name: Include OS dependencies
  ansible.builtin.include_tasks: "{{ ansible_facts['os_family'] | lower }}.yml"

- name: Create ~/.config/hypr directory
  become: false
  ansible.builtin.file:
    path: "~/.config/hypr"
    state: directory
    mode: "0755"

- name: Copy hyprland config files
  become: false
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "~/.config/hypr/{{ item }}"
    mode: "0644"
  loop:
    - hyprland.conf
    - background.jpg

- name: Create $HOME/screenshots dir
  become: false
  ansible.builtin.file:
    path: "~/screenshots/"
    state: directory
    mode: "0755"
