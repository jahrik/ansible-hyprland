---
- name: Update pacman cache
  become: true
  community.general.pacman:
    update_cache: true
  changed_when: false
  when: ansible_os_family == 'Archlinux'

- name: Install hyprland packages
  become: true
  community.general.pacman:
    name:
      - blueman
      - bluez
      - bluez-utils
      - brightnessctl
      - btop
      - file-roller
      - grim
      - gvfs
      - kitty
      - lxappearance
      - mako
      - network-manager-applet
      - noto-fonts-emoji
      - pacman-contrib
      - pamixer
      - pavucontrol
      - polkit-gnome
      - python-requests
      - slurp
      - starship
      - swappy
      - thunar
      - thunar-archive-plugin
      - ttf-jetbrains-mono-nerd
      - waybar
      - wayland
      - wofi
      - xfce4-settings
  when: ansible_os_family == 'Archlinux'

- name: Include jahrik.yay to install hyprland packages from AUR
  ansible.builtin.include_role:
    name: jahrik.yay
  vars:
    aur_packages:
      # - hyprland-nvidia-git
      - hyprland
      - swaylock-effects
      - swww
      - wlogout
  when: ansible_os_family == 'Archlinux'
