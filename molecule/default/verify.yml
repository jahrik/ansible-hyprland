---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Check hyprland binary
      ansible.builtin.stat:
        path: /usr/bin/hyprland
      register: hypr_bin

    - name: Assert hyprland is installed
      ansible.builtin.assert:
        that: hypr_bin.stat.exists
        fail_msg: "hyprland binary not found at /usr/bin/hyprland"

    - name: Check hyprland config directory
      ansible.builtin.stat:
        path: ~/.config/hypr
      register: hypr_dir

    - name: Assert hypr config directory exists
      ansible.builtin.assert:
        that: hypr_dir.stat.exists and hypr_dir.stat.isdir
        fail_msg: "~/.config/hypr directory not found"

    - name: Check hyprland.conf
      ansible.builtin.stat:
        path: ~/.config/hypr/hyprland.conf
      register: hypr_conf

    - name: Assert hyprland.conf exists
      ansible.builtin.assert:
        that: hypr_conf.stat.exists
        fail_msg: "~/.config/hypr/hyprland.conf not found"

    - name: Check hyprland background image
      ansible.builtin.stat:
        path: ~/.config/hypr/background.jpg
      register: hypr_bg

    - name: Assert background image exists
      ansible.builtin.assert:
        that: hypr_bg.stat.exists
        fail_msg: "~/.config/hypr/background.jpg not found"

- name: Verify uninstall
  hosts: all
  gather_facts: true
  tasks:
    - name: Run jahrik.hyprland with install false
      ansible.builtin.include_role:
        name: jahrik.hyprland
      vars:
        install: false

    - name: Check hyprland binary removed
      ansible.builtin.stat:
        path: /usr/bin/hyprland
      register: hypr_bin_removed

    - name: Assert hyprland binary is removed
      ansible.builtin.assert:
        that: not hypr_bin_removed.stat.exists
        fail_msg: "hyprland binary still present at /usr/bin/hyprland after uninstall"

    - name: Check hyprland config directory removed
      ansible.builtin.stat:
        path: ~/.config/hypr
      register: hypr_dir_removed

    - name: Assert hypr config directory is removed
      ansible.builtin.assert:
        that: not hypr_dir_removed.stat.exists
        fail_msg: "~/.config/hypr directory still present after uninstall"
