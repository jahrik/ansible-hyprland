---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: ubuntu
    image: geerlingguy/docker-ubuntu2604-ansible
    pre_build_image: true
  - name: arch
    image: jahrik/docker-archlinux-ansible
    pre_build_image: true
    pull: true
    ulimits:
      - nofile:1024:524288
provisioner:
  name: ansible
verifier:
  name: ansible
